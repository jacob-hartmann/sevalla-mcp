name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing (requires 11.5.1+)
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PKG_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag (${GITHUB_REF_NAME}) does not match package.json version (v${PKG_VERSION})."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild required native tooling
        run: pnpm rebuild esbuild

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          case "${PKG_VERSION}" in
            *-*)
              # Avoid setting "latest" to a prerelease. Publish under a prerelease dist-tag.
              npm publish --ignore-scripts --tag rc
              ;;
            *)
              npm publish --ignore-scripts
              ;;
          esac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: sbom.cyclonedx.json
          generate_release_notes: true
